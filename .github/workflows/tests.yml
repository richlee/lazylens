name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

  install-smoke:
    name: Installed CLI on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install .

      - name: Smoke test installed CLI
        run: >-
          python -c "import os, pathlib, subprocess, sys;
          root = pathlib.Path(os.environ['RUNNER_TEMP']) / 'lazylens-smoke';
          config = root / 'config.toml';
          db = root / 'index.sqlite3';
          docs = root / 'demo-docs';
          root.mkdir(parents=True, exist_ok=True);
          subprocess.run(['lazylens', '--help'], check=True);
          subprocess.run(['lazylens', '--config', str(config), 'demo', '--root', str(docs), '--database', str(db)], check=True);
          result = subprocess.run(['lazylens', '--config', str(config), 'search', 'SharePoint'], check=True, text=True, capture_output=True);
          assert 'Platform Overview' in result.stdout, result.stdout"
